<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Atrapar Limones</title>
  <link rel="stylesheet" href="limones.css"/>
  <script src="utils.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display&display=swap" rel="stylesheet">
</head>

<body onload="iniciar();">

  <div class="contenedor">

    <!-- Imagen superior -->
    <div class="imagen-top">
      <img src="astro.png" alt="Jugador gamer">
    </div>

    <header class="header">
      <h1>🍋 Atrapar Limones</h1>
      <p class="subtitulo">"Si del cielo te caen limones... haz fortuna con ellos"</p>
      <h2 class="autor">Por Adrian Chacaguasay</h2>
    </header>

    <section class="juego">
      <canvas id="areaJuego" width="600" height="400"></canvas>
    </section>

    <section class="panel">
      <div class="card">
        <p>Puntaje</p>
        <span id="txtPuntaje">0</span>
      </div>

      <div class="card">
        <p>Vidas</p>
        <span id="txtVidas">3</span>
      </div>
    </section>

    <section class="botones">
      <button onclick="moverIzquierda();" class="btn">◀ Izquierda</button>
      <button onclick="moverDerecha();" class="btn">Derecha ▶</button>
      <button class="btn btn-reiniciar">⟲ Reiniciar</button>
    </section>

  </div>

  <script src="limones.js"></script>
</body>
</html>
